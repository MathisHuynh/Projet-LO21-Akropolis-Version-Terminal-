<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Akropolis - Terminal Edition</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>

    <style>
      body { font-family: arial; margin: 0; padding: none; background-color: #222; color: #fff; }
      .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; text-align: center; }
      .spinner {
        height: 30px; width: 30px; margin: 20px auto 0 auto; display: block;
        -webkit-animation: rotation .8s linear infinite; animation: rotation 0.8s linear infinite;
        border-left: 5px solid rgb(235, 235, 235); border-right: 5px solid rgb(235, 235, 235);
        border-bottom: 5px solid rgb(235, 235, 235); border-top: 5px solid rgb(120, 120, 120);
        border-radius: 100%; background-color: rgb(189, 215, 46);
      }
      @-webkit-keyframes rotation { from {-webkit-transform: rotate(0deg);} to {-webkit-transform: rotate(360deg);} }
      @keyframes rotation { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
      #status { font-weight: bold; color: rgb(120, 120, 120); margin-top: 10px; }
      #progress { height: 20px; width: 300px; }
      #terminal { width: 90%; max-width: 900px; min-height: 450px; margin: 20px auto; padding: 15px; box-sizing: border-box; background-color: black; border: 2px solid #444; border-radius: 5px; }
      canvas.emscripten { display: none; } /* Masqué si votre jeu est 100% console */
    </style>
  </head>
  <body>
    <div class="spinner" id='spinner'></div>
    <div class="emscripten" id="status">Téléchargement...</div>
    <div class="emscripten"><progress value="0" max="100" id="progress" hidden=1></progress></div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    
    <div id="terminal"></div>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      
      var term = new Terminal({
        cols: 80, rows: 25, convertEol: true, cursorBlink: true,
        theme: { background: '#000000', foreground: '#ffffff' }
      });
      term.open(document.getElementById('terminal'));

      var setStatus = (text) => {
        if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
        if (text === setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - setStatus.last.time < 30) return;
        setStatus.last.time = now; setStatus.last.text = text;
        if (m) {
          text = m[1]; progressElement.value = parseInt(m[2])*100; progressElement.max = parseInt(m[4])*100;
          progressElement.hidden = false; spinnerElement.hidden = false;
        } else {
          progressElement.value = null; progressElement.max = null; progressElement.hidden = true;
          if (!text) spinnerElement.style.display = 'none';
        }
        statusElement.innerHTML = text;
      };

      var Module = {
        print(...args) {
          console.log(...args);
          term.writeln(args.join(' '));
        },
        cleanTTY() {
          term.clear();
        },
        canvas: canvasElement,
        setStatus: setStatus,
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          setStatus(left ? 'Préparation... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'Tous les téléchargements sont terminés.');
        }
      };
      
      window.term = term;
      setStatus('Téléchargement...');
    </script>
    
    <script async type="text/javascript" src="./page/Akropolis.js"></script>
  </body>
</html>
